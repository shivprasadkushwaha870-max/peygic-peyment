<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayGic Auto Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 28px; }
        .status-bar {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .status-bar.detecting { background: #fff3cd; color: #856404; display: block; }
        .status-bar.success { background: #d4edda; color: #155724; display: block; }
        .status-bar.error { background: #f8d7da; color: #721c24; display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .payment-section { display: none; margin-top: 30px; }
        .upi-apps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .upi-app {
            padding: 15px; border-radius: 12px; text-align: center;
            cursor: pointer; transition: transform 0.2s; text-decoration: none;
            color: white; font-weight: 600;
        }
        .upi-app:hover { transform: scale(1.05); }
        .phonepe { background: #5f259f; }
        .gpay { background: #4285f4; }
        .paytm { background: #00baf2; }
        .qr-section { margin-top: 20px; text-align: center; }
        .qr-code { width: 200px; height: 200px; margin: 10px auto; background: white; padding: 10px; border-radius: 10px; }
        .amount-display { text-align: center; font-size: 36px; font-weight: 700; color: #667eea; margin: 20px 0; }
        .detect-btn { background: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔒 PayGic Auto Payment</h1>
            <p>Smart RID Detection Enabled</p>
        </div>

        <div class="status-bar" id="statusBar">Detecting RID...</div>

        <button onclick="detectRID()" class="detect-btn" id="detectBtn">
            🔍 Auto-Detect RID
        </button>

        <div id="paymentForm" style="display: none;">
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customerName" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="customerEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="customerMobile" placeholder="10 digit mobile" maxlength="10" required>
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" placeholder="Enter amount" min="1" max="100000" required>
            </div>
            <button onclick="initiatePayment()" id="payButton">Pay Now</button>
        </div>

        <div class="payment-section" id="paymentSection">
            <h3 style="text-align: center;">Choose Payment Method</h3>
            <div class="amount-display">₹<span id="displayAmount">0</span></div>
            <div class="upi-apps">
                <a href="#" id="phonePeLink" class="upi-app phonepe" target="_blank">PhonePe</a>
                <a href="#" id="gPayLink" class="upi-app gpay" target="_blank">Google Pay</a>
                <a href="#" id="paytmLink" class="upi-app paytm" target="_blank">Paytm</a>
            </div>
            <div class="qr-section">
                <p>Or scan QR:</p>
                <div class="qr-code"><img id="qrImage" style="width: 100%; height: 100%;"></div>
            </div>
            <button onclick="checkStatus()" style="margin-top: 20px; background: #17a2b8;">Check Status</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://peygic-api.shivprasadkushwaha870.workers.dev/';
        let currentOrderId = '';
        let ridDetected = false;

        async function detectRID() {
            const statusBar = document.getElementById('statusBar');
            const detectBtn = document.getElementById('detectBtn');
            
            statusBar.className = 'status-bar detecting';
            statusBar.textContent = '🔍 Auto-detecting RID... Please wait';
            detectBtn.disabled = true;

            try {
                const response = await fetch(`${WORKER_URL}/api/detect-rid`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                
                if (data.found) {
                    statusBar.className = 'status-bar success';
                    statusBar.textContent = `✅ RID Detected: ${data.rid}`;
                    document.getElementById('paymentForm').style.display = 'block';
                    document.getElementById('detectBtn').style.display = 'none';
                    ridDetected = true;
                } else {
                    statusBar.className = 'status-bar error';
                    statusBar.textContent = '❌ RID not found. Contact PayGic support.';
                }
            } catch (error) {
                statusBar.className = 'status-bar error';
                statusBar.textContent = '❌ Error: ' + error.message;
            } finally {
                detectBtn.disabled = false;
            }
        }

        async function initiatePayment() {
            if (!ridDetected) {
                alert('Please auto-detect RID first!');
                return;
            }
            
            // ... same payment code as before
            const name = document.getElementById('customerName').value;
            const email = document.getElementById('customerEmail').value;
            const mobile = document.getElementById('customerMobile').value;
            const amount = document.getElementById('amount').value;

            if (!name || !email || !mobile || !amount) {
                alert('Fill all fields!');
                return;
            }

            document.getElementById('payButton').disabled = true;
            currentOrderId = `ORDER_${Date.now()}`;

            try {
                const response = await fetch(`${WORKER_URL}/api/payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount, merchantReferenceId: currentOrderId,
                        customer_name: name, customer_email: email, customer_mobile: mobile
                    })
                });
                
                const data = await response.json();
                if (data.status && data.data) {
                    showPaymentOptions(data.data, amount);
                } else {
                    alert('Payment failed: ' + (data.msg || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('payButton').disabled = false;
            }
        }

        function showPaymentOptions(data, amount) {
            document.getElementById('paymentForm').style.display = 'none';
            document.getElementById('paymentSection').style.display = 'block';
            document.getElementById('displayAmount').textContent = amount;
            
            document.getElementById('phonePeLink').href = data.phonePe || data.intent;
            document.getElementById('gPayLink').href = data.gpay || data.intent;
            document.getElementById('paytmLink').href = data.paytm || data.intent;
            
            if (data.dynamicQR) {
                document.getElementById('qrImage').src = 
                    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.dynamicQR)}`;
            }
        }

        async function checkStatus() {
            if (!currentOrderId) return;
            try {
                const response = await fetch(`${WORKER_URL}/api/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ merchantReferenceId: currentOrderId })
                });
                const data = await response.json();
                alert(`Status: ${data.txnStatus || 'UNKNOWN'}\n${data.msg || ''}`);
            } catch (error) {
                alert('Error checking status');
            }
        }
    </script>
</body>
</html>
