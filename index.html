<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayGic Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { color: #666; margin-bottom: 25px; }
        .status-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }
        .status-box.show { display: block; }
        .detecting { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        .pay-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .pay-btn:hover { opacity: 0.9; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #667eea; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #successSection { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 PayGic Payment</h1>
        <p class="subtitle">Secure UPI Payment Gateway</p>
        
        <div id="statusBox" class="status-box"></div>
        <div class="spinner" id="spinner"></div>
        
        <div id="paymentForm">
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="name" placeholder="Enter name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="10 digit mobile" maxlength="10">
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" placeholder="Enter amount" min="1">
            </div>
            <button class="pay-btn" onclick="initiatePayment()">Pay Now</button>
        </div>
        
        <div id="successSection">
            <h3>✅ Payment Initiated!</h3>
            <p>Complete payment on the next page.</p>
            <button class="pay-btn" onclick="checkStatus()" style="margin-top: 15px;">Check Status</button>
        </div>
    </div>

    <script>
        let currentOrderId = '';

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = 'status-box show ' + type;
        }

        function showSpinner(show) {
            document.getElementById('spinner').style.display = show ? 'block' : 'none';
        }

        async function initiatePayment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const amount = document.getElementById('amount').value;
            
            if (!name || !email || !mobile || !amount) {
                showStatus('Please fill all fields', 'error');
                return;
            }
            
            showStatus('Creating payment...', 'detecting');
            showSpinner(true);
            
            try {
                const res = await fetch('/api/payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: amount, 
                        customer_name: name, 
                        customer_email: email, 
                        customer_mobile: mobile 
                    })
                });
                
                const data = await res.json();
                
                if (data.status && data.data && data.data.payPageUrl) {
                    window.location.href = data.data.payPageUrl;
                } else {
                    showStatus('Error: ' + (data.msg || data.error || 'Payment failed'), 'error');
                }
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            } finally {
                showSpinner(false);
            }
        }

        async function checkStatus() {
            if (!currentOrderId) {
                const urlParams = new URLSearchParams(window.location.search);
                currentOrderId = urlParams.get('orderId');
            }
            
            if (!currentOrderId) {
                showStatus('No order ID found', 'error');
                return;
            }
            
            showStatus('Checking status...', 'detecting');
            showSpinner(true);
            
            try {
                const res = await fetch('/api/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: currentOrderId })
                });
                
                const data = await res.json();
                showStatus('Status: ' + (data.txnStatus || 'UNKNOWN'), 
                    data.txnStatus === 'SUCCESS' ? 'success' : 'detecting');
            } catch (e) {
                showStatus('Error checking status', 'error');
            } finally {
                showSpinner(false);
            }
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            const status = urlParams.get('status');
            
            if (orderId && status === 'success') {
                currentOrderId = orderId;
                document.getElementById('paymentForm').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';
                showStatus('Payment completed! Order: ' + orderId, 'success');
            }
        };
    </script>
</body>
</html>
