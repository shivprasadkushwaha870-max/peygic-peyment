<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Payment - ₹499</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 5px; font-size: 26px; }
        h2 { color: #333; margin-bottom: 10px; font-size: 20px; }
        p.subtitle { color: #666; margin-bottom: 20px; }
        .price-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .price-label { font-size: 14px; opacity: 0.9; }
        .price-amount { font-size: 48px; font-weight: 700; margin: 5px 0; }
        .price-currency { font-size: 20px; }
        .status-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }
        .status-box.show { display: block; }
        .detecting { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        .pay-btn { background: #28a745; color: white; }
        .pay-btn:hover { background: #218838; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #667eea; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 The Super Mind</h1>
        <h2>Course Enrollment</h2>
        <p class="subtitle">Complete your payment to get instant access</p>
        
        <div class="price-box">
            <div class="price-label">Total Amount</div>
            <div class="price-amount"><span class="price-currency">₹</span>499</div>
            <div class="price-label">One-time payment</div>
        </div>
        
        <div id="statusBox" class="status-box"></div>
        <div class="spinner" id="spinner"></div>
        
        <div id="paymentForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="10 digit mobile number" maxlength="10">
            </div>
            <button class="pay-btn" onclick="initiatePayment()">Pay ₹499 Now</button>
        </div>
        
        <div class="secure-badge">
            <span>🔒</span>
            <span>Secured by PayGic UPI</span>
        </div>
    </div>

    <script>
        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = 'status-box show ' + type;
        }

        function showSpinner(show) {
            document.getElementById('spinner').style.display = show ? 'block' : 'none';
        }

        async function initiatePayment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            
            if (!name || !email || !mobile) {
                showStatus('Please fill all fields', 'error');
                return;
            }
            
            if (mobile.length !== 10) {
                showStatus('Please enter valid 10-digit mobile number', 'error');
                return;
            }
            
            showStatus('Creating secure payment...', 'detecting');
            showSpinner(true);
            
            try {
                const res = await fetch('/api/payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: '499', 
                        customer_name: name, 
                        customer_email: email, 
                        customer_mobile: mobile 
                    })
                });
                
                const data = await res.json();
                
                if (data.status && data.data && data.data.payPageUrl) {
                    window.location.href = data.data.payPageUrl;
                } else {
                    showStatus('Error: ' + (data.msg || data.error || 'Payment failed'), 'error');
                }
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            } finally {
                showSpinner(false);
            }
        }
    </script>
</body>
</html>
